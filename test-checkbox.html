<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox Test - First Principles</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
            background: #1e293b;
            color: #f1f5f9;
        }
        .message {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .controls {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            margin-top: 0.5rem;
        }
        label {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            cursor: pointer;
        }
        input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #a855f7;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: #f1f5f9;
        }
        button {
            padding: 0.5rem 1rem;
            background: #a855f7;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
        }
        #log {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <h1>🧪 Checkbox Architecture Test</h1>
    <p>Testing if checkboxes and text inputs work on the SAME layer (like your #FromDad fields)</p>

    <!-- Simulate Discord messages -->
    <div class="message" data-msg-id="123">
        <div><strong>Message 1:</strong> Hello from WhatsApp</div>
        <div class="controls">
            <label>
                <input type="checkbox" class="message-checkbox" data-message-id="123">
                <span style="font-size: 0.75rem; color: #94a3b8;">Export</span>
            </label>
            <input type="text" class="tag-input" data-message-id="123" placeholder="#FromDad Christmas 2021">
        </div>
    </div>

    <div class="message" data-msg-id="456">
        <div><strong>Message 2:</strong> Test image attachment</div>
        <div class="controls">
            <label>
                <input type="checkbox" class="message-checkbox" data-message-id="456">
                <span style="font-size: 0.75rem; color: #94a3b8;">Export</span>
            </label>
            <input type="text" class="tag-input" data-message-id="456" placeholder="#FromDad Christmas 2021">
        </div>
    </div>

    <div class="message" data-msg-id="789">
        <div><strong>Message 3:</strong> Another WhatsApp message</div>
        <div class="controls">
            <label>
                <input type="checkbox" class="message-checkbox" data-message-id="789">
                <span style="font-size: 0.75rem; color: #94a3b8;">Export</span>
            </label>
            <input type="text" class="tag-input" data-message-id="789" placeholder="#FromDad Christmas 2021">
        </div>
    </div>

    <button onclick="testSelection()">📋 Test: Show Selected Messages</button>

    <div id="log"></div>

    <script>
        const log = document.getElementById('log');
        const selectedMessages = new Set();

        function addLog(message) {
            const timestamp = new Date().toLocaleTimeString();
            log.innerHTML += `${timestamp} - ${message}\n`;
            log.scrollTop = log.scrollHeight;
        }

        // Event delegation for checkboxes (same as production code)
        document.addEventListener('change', function(e) {
            if (e.target.classList.contains('message-checkbox')) {
                const messageId = e.target.dataset.messageId;
                const checked = e.target.checked;
                
                if (checked) {
                    selectedMessages.add(messageId);
                    addLog(`✅ Checkbox CHECKED for message ${messageId}`);
                } else {
                    selectedMessages.delete(messageId);
                    addLog(`❌ Checkbox UNCHECKED for message ${messageId}`);
                }
                
                addLog(`📊 Selected count: ${selectedMessages.size}`);
            }
        });

        // Event delegation for text inputs
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('tag-input')) {
                const messageId = e.target.dataset.messageId;
                const value = e.target.value;
                addLog(`✏️ Text input for message ${messageId}: "${value}"`);
            }
        });

        function testSelection() {
            addLog(`\n🎯 TEST RESULTS:`);
            addLog(`Total selected: ${selectedMessages.size}`);
            addLog(`Selected IDs: ${Array.from(selectedMessages).join(', ')}`);
            
            // Verify DOM state
            document.querySelectorAll('.message-checkbox').forEach(cb => {
                const id = cb.dataset.messageId;
                const inSet = selectedMessages.has(id);
                const isChecked = cb.checked;
                const match = inSet === isChecked ? '✅' : '❌';
                addLog(`${match} Message ${id}: Set=${inSet}, DOM=${isChecked}`);
            });
        }

        addLog('🚀 Test initialized - Try clicking checkboxes and typing in text fields');
        addLog('✓ Both inputs are on the SAME layer within each message');
        addLog('✓ Both use data-message-id attributes for connection');
        addLog('✓ Both use document-level event delegation\n');
    </script>
</body>
</html>
