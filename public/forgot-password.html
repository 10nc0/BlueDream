<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your Nyanbook password via WhatsApp">
    <title>Forgot Password | Your Nyanbook~</title>
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/components/cat-animation.css">
</head>
<body>
    <div class="forgot-container">
        <div id="catContainer" class="cat-animation-component">
            <canvas id="hopCanvas" class="character-canvas" width="125" height="125"></canvas>
            <div id="dateTimeDefault" class="cat-datetime-default">
                <span id="currentTime">2025/11/01 - 8:00:00AM</span>
            </div>
        </div>
        
        <div class="logo">
            <h1>Reset Password</h1>
            <p>We'll send a reset link to your WhatsApp</p>
        </div>

        <div id="errorMessage" class="error hidden"></div>
        <div id="successMessage" class="success hidden"></div>

        <div class="info-box">
            Enter the email and phone number you used when creating your book. We'll verify and send a reset link via WhatsApp.
        </div>

        <form id="forgotForm">
            <div class="form-group">
                <label>Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="you@example.com" 
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label>WhatsApp Phone Number</label>
                <input 
                    type="tel" 
                    id="phone" 
                    placeholder="+62 812 3456 7890" 
                    required
                    autocomplete="tel"
                >
                <small class="helper-text">Include country code (e.g., +62 for Indonesia, +1 for USA)</small>
            </div>

            <button type="submit">Send Reset Link</button>
        </form>

        <div class="link">
            Remember your password? <a href="/login.html">Log in</a>
        </div>
    </div>

    <script src="/js/ui/cat-animation.js"></script>
    <script>
        const form = document.getElementById('forgotForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
            successMessage.classList.add('hidden');
        }

        function showSuccess(msg) {
            successMessage.textContent = msg;
            successMessage.classList.remove('hidden');
            errorMessage.classList.add('hidden');
        }

        function standardizePhone(phone) {
            let cleaned = phone.replace(/[\s\-\(\)\.]/g, '');
            // Only add +62 default if starts with 0 (Indonesian local format)
            if (cleaned.startsWith('0')) {
                cleaned = '+62' + cleaned.substring(1);
            }
            // Only add + prefix if no + present and starts with digit
            if (!cleaned.startsWith('+') && /^\d/.test(cleaned)) {
                cleaned = '+' + cleaned;
            }
            return cleaned;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = standardizePhone(document.getElementById('phone').value);
            
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, phone })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Reset link sent to your WhatsApp! Check your messages.');
                    form.reset();
                } else {
                    showError(data.error || 'Failed to send reset link. Please check your details.');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
