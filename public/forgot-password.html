<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Nyan Bridge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.618rem;
        }

        .forgot-container {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(30px) saturate(200%) brightness(1.1);
            -webkit-backdrop-filter: blur(30px) saturate(200%) brightness(1.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.25rem;
            padding: 2rem;
            width: 100%;
            max-width: 535px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }
        
        @media (max-width: 480px) {
            body {
                padding: 0.618rem;
            }
            .forgot-container {
                padding: 1.618rem;
                border-radius: 0.618rem;
            }
            .logo h1 {
                font-size: 1.25rem;
            }
            .logo p {
                font-size: 0.875rem;
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 1.618rem;
        }

        .logo h1 {
            color: #f1f5f9;
            font-size: 1.618rem;
            font-weight: 700;
            margin-bottom: 0.618rem;
        }

        .logo p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.618rem;
        }

        label {
            display: block;
            color: #e2e8f0;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.618rem;
        }

        input {
            width: 100%;
            padding: 0.618rem 1rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.618rem;
            color: #f1f5f9;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: rgba(251, 146, 60, 0.5);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.1);
        }

        input::placeholder {
            color: #64748b;
        }

        button {
            width: 100%;
            padding: 0.618rem 1.618rem;
            background: rgba(251, 146, 60, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(251, 146, 60, 0.3);
            border-radius: 0.618rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(251, 146, 60, 0.2);
        }

        button:hover {
            background: rgba(249, 115, 22, 0.95);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(251, 146, 60, 0.3);
        }

        button:disabled {
            background: rgba(71, 85, 105, 0.8);
            cursor: not-allowed;
            transform: none;
        }

        .btn-back {
            background: rgba(71, 85, 105, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 0.618rem;
        }
        
        .btn-back:hover {
            background: rgba(100, 116, 139, 0.9);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 0.618rem;
            border-radius: 0.618rem;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 0.618rem;
            border-radius: 0.618rem;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .help-text {
            color: #64748b;
            font-size: 0.875rem;
            margin-top: 0.618rem;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .link {
            text-align: center;
            margin-top: 1.618rem;
            color: #94a3b8;
            font-size: 1rem;
        }

        .link a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover {
            color: #3b82f6;
            text-decoration: underline;
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #93c5fd;
            padding: 0.618rem;
            border-radius: 0.618rem;
            font-size: 0.875rem;
            margin-bottom: 1.618rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="logo">
            <h1>🌉 Nyan Bridge</h1>
            <p>Reset Your Password</p>
        </div>

        <div class="info-box">
            Enter your phone number to receive a reset code via SMS
        </div>

        <div id="error" class="error" style="display: none;"></div>
        <div id="success" class="success" style="display: none;"></div>

        <!-- Request Reset -->
        <div id="request-form" class="form-section active">
            <form onsubmit="requestReset(event)">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1234567890" required>
                    <p class="help-text">Enter phone number with country code</p>
                </div>
                <button type="submit">Send Reset Code</button>
            </form>
        </div>

        <!-- Verify OTP and Set New Password -->
        <div id="reset-form" class="form-section">
            <form onsubmit="resetPassword(event)">
                <div class="form-group">
                    <label>Reset Code</label>
                    <input type="text" id="otp" placeholder="123456" maxlength="6" required>
                    <p class="help-text">Check console for code (development only)</p>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" placeholder="Enter new password" required minlength="8">
                    <p class="help-text">Minimum 8 characters</p>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm new password" required minlength="8">
                </div>
                <button type="submit">Reset Password</button>
                <button type="button" onclick="backToRequest()" class="btn-back">Back</button>
            </form>
        </div>

        <button onclick="window.location.href='/login.html'" class="btn-back">Back to Login</button>

        <div class="link">
            Don't have an account? <a href="/register.html">Register</a>
        </div>
    </div>

    <script>
        let currentPhone = '';

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }

        async function requestReset(e) {
            e.preventDefault();
            hideMessages();
            
            currentPhone = document.getElementById('phone').value;
            
            try {
                const res = await fetch('/api/auth/forgot-password/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: currentPhone })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess(`Reset code sent to ${currentPhone}! Check console (dev mode)`);
                    console.log('🔐 RESET CODE:', data.devOtp);
                    document.getElementById('request-form').classList.remove('active');
                    document.getElementById('reset-form').classList.add('active');
                } else {
                    showError(data.error || 'Failed to send reset code');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        async function resetPassword(e) {
            e.preventDefault();
            hideMessages();
            
            const otp = document.getElementById('otp').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (newPassword.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }
            
            try {
                const res = await fetch('/api/auth/forgot-password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: currentPhone, 
                        otp: otp, 
                        newPassword: newPassword 
                    })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess('Password reset successful! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showError(data.error || 'Failed to reset password');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        function backToRequest() {
            document.getElementById('reset-form').classList.remove('active');
            document.getElementById('request-form').classList.add('active');
            document.getElementById('otp').value = '';
            document.getElementById('new-password').value = '';
            document.getElementById('confirm-password').value = '';
            hideMessages();
        }

        // Check if already logged in
        fetch('/api/auth/status')
            .then(res => res.json())
            .then(data => {
                if (data.authenticated) {
                    window.location.href = '/';
                }
            });
    </script>
</body>
</html>
