<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Reset your Nyanbook password via email">
    <title>Forgot Password | Your Nyanbook~</title>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nyanbook">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/components/cat-animation.css">
</head>
<body>
    <div class="forgot-container">
        <div id="catContainer" class="cat-animation-component">
            <canvas id="hopCanvas" class="character-canvas" width="250" height="250"></canvas>
            <div id="dateTimeDefault" class="cat-datetime-default">
                <span id="currentTime">2025/11/01 - 8:00:00AM</span>
            </div>
        </div>
        
        <div class="logo">
            <h1>Reset Password</h1>
            <p>Nyan will send a reset link to your email</p>
        </div>

        <div id="errorMessage" class="error hidden"></div>
        <div id="successMessage" class="success hidden"></div>

        <div class="info-box">
            Enter the email and phone number you used when creating your book. We'll verify and send a reset link to your email.
        </div>

        <form id="forgotForm">
            <div class="form-group">
                <label>Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="you@example.com" 
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input 
                    type="tel" 
                    id="phone" 
                    placeholder="+62 812 3456 7890" 
                    required
                    autocomplete="tel"
                >
                <small class="helper-text">Include country code (e.g., +62 for Indonesia, +1 for USA)</small>
            </div>

            <button type="submit">Send Reset Link</button>
        </form>

        <div class="link">
            Remember your password? <a href="/login.html">Log in</a>
        </div>
    </div>

    <script src="/js/ui/cat-animation.js?v=20260322"></script>
    <script src="/js/auth-forgot-password.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
