<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Nyan Bridge</title>
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/components/cat-animation.css">
</head>
<body>
    <div class="forgot-container">
        <!-- UNIVERSE FRAME TRANSCENDENTAL CAT COMPONENT -->
        <div id="catContainer" class="cat-animation-component">
            <canvas id="hopCanvas" class="character-canvas" width="125" height="125"></canvas>
            <div id="dateTimeDefault" class="cat-datetime-default">
                <span id="currentTime">2025/11/01 - 8:00:00AM</span>
            </div>
        </div>
        
        <div class="logo">
            <h1>🌉 Nyan Bridge</h1>
            <p>Reset Your Password</p>
        </div>

        <div class="info-box">
            Enter your phone number to receive a reset code via SMS
        </div>

        <div id="error" class="error hidden"></div>
        <div id="success" class="success hidden"></div>

        <!-- Request Reset -->
        <div id="request-form" class="form-section active">
            <form id="requestForm">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1234567890" required>
                    <p class="help-text">Enter phone number with country code</p>
                </div>
                <button type="submit">Send Reset Code</button>
            </form>
        </div>

        <!-- Verify OTP and Set New Password -->
        <div id="reset-form" class="form-section">
            <form id="resetForm">
                <div class="form-group">
                    <label>Reset Code</label>
                    <input type="text" id="otp" placeholder="123456" maxlength="6" required>
                    <p class="help-text">Check console for code (development only)</p>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="new-password" placeholder="Enter new password" required minlength="8">
                    <p class="help-text">Minimum 8 characters</p>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm new password" required minlength="8">
                </div>
                <button type="submit">Reset Password</button>
                <button type="button" id="backToRequestBtn" class="btn-back">Back</button>
            </form>
        </div>

        <button id="backToLoginBtn" class="btn-back">Back to Login</button>

        <div class="link">
            Don't have an account? <a href="/signup.html">Sign up</a>
        </div>
    </div>

    <script src="/js/auth-forgot.js"></script>
</body>
</html>
