<!DOCTYPE html>
<html>
<head>
    <title>Test Attachment Preview</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #1e293b; color: white; }
        button { padding: 1rem; font-size: 1rem; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 0.5rem; }
        #result { margin-top: 2rem; }
        img { max-width: 800px; max-height: 600px; border: 2px solid #60a5fa; border-radius: 0.5rem; }
    </style>
</head>
<body>
    <h1>🧪 Attachment Preview Test</h1>
    <p>Testing message #2 (Giovanni Wilson's image from 10/27/2025, 03:39:57 PDT)</p>
    
    <button onclick="testAttachment()">🖼️ Load Attachment</button>
    <div id="result"></div>

    <script>
        async function testAttachment() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Loading...</p>';
            
            try {
                // Get JWT token from localStorage (set by login page)
                const accessToken = localStorage.getItem('accessToken');
                
                if (!accessToken) {
                    resultDiv.innerHTML = '<p style="color: #ef4444;">❌ No access token found. Please login first at <a href="/" style="color: #60a5fa;">/</a></p>';
                    return;
                }
                
                // Fetch media data
                const response = await fetch('/api/messages/2/media', {
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h2>✅ Success!</h2>
                    <p><strong>Sender:</strong> ${data.sender_name}</p>
                    <p><strong>Media Type:</strong> ${data.media_type}</p>
                    <p><strong>Data Size:</strong> ${data.media_data.length} characters (base64)</p>
                    <p><strong>Timestamp:</strong> ${new Date(data.timestamp).toLocaleString()}</p>
                    <hr style="margin: 2rem 0; border: 1px solid #475569;">
                    <h3>Image Preview:</h3>
                    <img src="${data.media_data}" alt="Attachment">
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: #ef4444;">❌ Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
