<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Account Settings | NyanBook~</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: #e2e8f0;
            overflow: hidden;
        }

        #settings-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0 1.25rem;
            height: 52px;
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid rgba(148, 163, 184, 0.12);
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        #settings-header a {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.3rem 0.7rem;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 0.4rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.15s;
        }

        #settings-header a:hover {
            background: rgba(148, 163, 184, 0.18);
            color: #e2e8f0;
        }

        #settings-header h1 {
            font-size: 0.95rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        #settings-body {
            height: calc(100vh - 52px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* accountTab is built by AccountModule — give it a neutral id wrapper */
        #accountTab {
            flex: 1;
            min-height: 0;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
        }

        #settings-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #64748b;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div id="settings-header">
        <a href="/dashboard">← Dashboard</a>
        <h1>Account Settings</h1>
    </div>
    <div id="settings-body">
        <div id="accountTab">
            <div id="settings-loading">Loading…</div>
        </div>
    </div>

    <script src="/js/modules/state.js?v=20260111-2"></script>
    <script src="/js/modules/auth.js?v=20260111-2"></script>
    <script src="/js/ui/account.js?v=20260609-2"></script>
    <script src="/js/settings-init.js?v=20260609-1"></script>
    <script src="/js/sw-register.js"></script>
</body>
</html>
