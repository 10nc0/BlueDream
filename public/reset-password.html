<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Set your new Nyanbook password">
    <title>Reset Password | Your Nyanbook~</title>
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/components/cat-animation.css">
</head>
<body>
    <div class="forgot-container">
        <div id="catContainer" class="cat-animation-component">
            <canvas id="hopCanvas" class="character-canvas" width="125" height="125"></canvas>
            <div id="dateTimeDefault" class="cat-datetime-default">
                <span id="currentTime">2025/11/01 - 8:00:00AM</span>
            </div>
        </div>
        
        <div class="logo">
            <h1>New Password</h1>
            <p>Choose a strong password for your Nyanbook</p>
        </div>

        <div id="errorMessage" class="error hidden"></div>
        <div id="successMessage" class="success hidden"></div>

        <div id="tokenError" class="error hidden">
            Invalid or expired reset link. Please request a new one.
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Min. 6 characters" 
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    placeholder="Confirm your password" 
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
            </div>

            <button type="submit">Set New Password</button>
        </form>

        <div class="link">
            <a href="/login.html">Back to Login</a>
        </div>
    </div>

    <script src="/js/ui/cat-animation.js"></script>
    <script>
        const form = document.getElementById('resetForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const tokenError = document.getElementById('tokenError');

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            form.style.display = 'none';
            tokenError.classList.remove('hidden');
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
            successMessage.classList.add('hidden');
        }

        function showSuccess(msg) {
            successMessage.textContent = msg;
            successMessage.classList.remove('hidden');
            errorMessage.classList.add('hidden');
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            const submitBtn = form.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showSuccess('Password updated! Redirecting to login...');
                    form.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showError(data.error || 'Failed to reset password. Link may have expired.');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Set New Password';
            }
        });
    </script>
</body>
</html>
