<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Set your new Nyanbook password">
    <title>Reset Password | Your Nyanbook~</title>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nyanbook">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/components/cat-animation.css">
</head>
<body>
    <div class="forgot-container">
        <div id="catContainer" class="cat-animation-component">
            <canvas id="hopCanvas" class="character-canvas" width="250" height="250"></canvas>
            <div id="dateTimeDefault" class="cat-datetime-default">
                <span id="currentTime">2025/11/01 - 8:00:00AM</span>
            </div>
        </div>
        
        <div class="logo">
            <h1>New Password</h1>
            <p>Choose a strong password for your Nyanbook</p>
        </div>

        <div id="errorMessage" class="error hidden"></div>
        <div id="successMessage" class="success hidden"></div>

        <div id="tokenError" class="error hidden">
            Invalid or expired reset link. Please request a new one.
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label>New Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Min. 6 characters" 
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
            </div>

            <div class="form-group">
                <label>Confirm New Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    placeholder="Confirm your password" 
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
            </div>

            <button type="submit">Set New Password</button>
        </form>

        <div class="link">
            <a href="/login.html">Back to Login</a>
        </div>
    </div>

    <script src="/js/ui/cat-animation.js?v=20260322"></script>
    <script src="/js/auth-reset-password.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
