<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Every Record, Forever, Searchable - also (#Hash)Tag-enabled. Nyan~">
    <title>Login | Your Nyanbook~</title>
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nyanbook">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/components/cat-animation.css">
</head>
<body>
    <div class="login-container">
        <!-- UNIVERSE FRAME TRANSCENDENTAL CAT COMPONENT -->
        <div id="catContainer" class="cat-animation-component">
            <canvas id="hopCanvas" class="character-canvas" width="200" height="200"></canvas>
            <div id="dateTimeDefault" class="cat-datetime-default">
                <span id="currentTime">2025/11/01 - 8:00:00AM</span>
            </div>
        </div>
        
        <div class="logo">
            <h1>Your Nyanbook~</h1>
            <p>Every Record, Forever, Searchable <br> also (#Hash)Tag-enabled. Nyan~</p>
        </div>

        <!-- Tabs removed - Phone OTP deprecated (no Twilio configured) -->

        <div id="error" class="error hidden"></div>
        <div id="success" class="success hidden"></div>

        <div id="email-form" class="form-section active">
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit">🐈‍⬛ Login</button>
            </form>

            <button type="button" id="aiPlaygroundBtn" class="ai-button">🧠 AI Playground</button>

            <div class="links-container">
                <a href="/signup.html">Create account</a>
                <a href="/forgot-password.html">Forgot password</a>
            </div>
        </div>

        <!-- Phone OTP form removed - deprecated (no Twilio configured) -->
    </div>

    <script src="/js/ui/cat-animation.js?v=20260322"></script>
    <script src="/js/auth-login.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
