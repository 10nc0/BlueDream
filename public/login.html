<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Multi-Platform Bridge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 1rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            color: #f1f5f9;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .logo p {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.3);
            border-radius: 0.5rem;
            color: #94a3b8;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .tab:hover {
            background: rgba(51, 65, 85, 0.5);
        }

        .tab.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            color: #e2e8f0;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.5);
            border-radius: 0.5rem;
            color: #f1f5f9;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input::placeholder {
            color: #64748b;
        }

        button {
            width: 100%;
            padding: 0.875rem;
            background: #3b82f6;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #2563eb;
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .help-text {
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .otp-group {
            display: flex;
            gap: 0.75rem;
        }

        .otp-group input {
            flex: 1;
        }

        .otp-group button {
            flex-shrink: 0;
            width: auto;
            padding: 0.75rem 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🌉 Multi-Platform Bridge</h1>
            <p>Secure Login</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('email')">Email Login</div>
            <div class="tab" onclick="switchTab('phone')">Phone OTP</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
        <div id="success" class="success" style="display: none;"></div>

        <!-- Email/Password Login -->
        <div id="email-form" class="form-section active">
            <form onsubmit="loginWithEmail(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="admin@bridge.local" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                    <p class="help-text">Default admin: admin@bridge.local / admin123</p>
                </div>
                <button type="submit">Sign In</button>
            </form>
        </div>

        <!-- Phone OTP Login -->
        <div id="phone-form" class="form-section">
            <div id="phone-request">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1234567890" required>
                    <p class="help-text">Enter with country code (e.g., +1234567890)</p>
                </div>
                <button onclick="requestOTP(event)">Send OTP</button>
            </div>

            <div id="phone-verify" style="display: none;">
                <div class="form-group">
                    <label>Enter OTP</label>
                    <div class="otp-group">
                        <input type="text" id="otp" placeholder="123456" maxlength="6" required>
                        <button onclick="verifyOTP(event)">Verify</button>
                    </div>
                    <p class="help-text">Check console for OTP code (development only)</p>
                </div>
                <button onclick="backToPhone()" style="background: #475569;">Back</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'email') {
                document.querySelector('.tabs .tab:nth-child(1)').classList.add('active');
                document.getElementById('email-form').classList.add('active');
            } else {
                document.querySelector('.tabs .tab:nth-child(2)').classList.add('active');
                document.getElementById('phone-form').classList.add('active');
            }
            
            hideMessages();
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }

        async function loginWithEmail(e) {
            e.preventDefault();
            hideMessages();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        async function requestOTP(e) {
            e.preventDefault();
            hideMessages();
            
            const phone = document.getElementById('phone').value;
            
            try {
                const res = await fetch('/api/auth/otp/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess(`OTP sent to ${phone}! Check console for code (dev mode)`);
                    console.log('🔐 OTP CODE:', data.devOtp);
                    document.getElementById('phone-request').style.display = 'none';
                    document.getElementById('phone-verify').style.display = 'block';
                } else {
                    showError(data.error || 'Failed to send OTP');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        async function verifyOTP(e) {
            e.preventDefault();
            hideMessages();
            
            const phone = document.getElementById('phone').value;
            const otp = document.getElementById('otp').value;
            
            try {
                const res = await fetch('/api/auth/otp/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, otp })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess('Login successful! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showError(data.error || 'Invalid OTP');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        function backToPhone() {
            document.getElementById('phone-request').style.display = 'block';
            document.getElementById('phone-verify').style.display = 'none';
            document.getElementById('otp').value = '';
            hideMessages();
        }

        // Check if already logged in
        fetch('/api/auth/status')
            .then(res => res.json())
            .then(data => {
                if (data.authenticated) {
                    window.location.href = '/';
                }
            });
    </script>
</body>
</html>
