<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Your Nyanbook~</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Your Nyanbook~</h1>
            <p>X to Discord Note</p>
        </div>

        <!-- Tabs removed - Phone OTP deprecated (no Twilio configured) -->

        <div id="error" class="error hidden"></div>
        <div id="success" class="success hidden"></div>

        <div id="email-form" class="form-section active">
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit">Sign In</button>
            </form>

            <div class="links-container">
                <a href="/forgot-password.html">Forgot password?</a>
                <a href="/signup.html">Create account</a>
            </div>
        </div>

        <!-- Phone OTP form removed - deprecated (no Twilio configured) -->
    </div>

    <script src="/js/auth-login.js"></script>
</body>
</html>
