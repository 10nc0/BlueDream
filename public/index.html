<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 Nyan Bridge - apps to apps hopping, nyan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a7b 100%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Header with Nyan Cat */
        .header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tagline {
            font-size: 0.875rem;
            color: #94a3b8;
            font-weight: 400;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        #userInfo {
            font-size: 0.9rem;
        }

        .logout-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
            border: none;
            padding: 0.618rem 1.618rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        /* Main Content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .tab {
            background: rgba(148, 163, 184, 0.1);
            border: none;
            color: #94a3b8;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tab.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Bot Library Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.75rem;
            font-weight: 700;
        }

        .create-bot-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .create-bot-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .search-filter {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .search-box {
            flex: 1;
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            color: #e2e8f0;
            font-size: 1rem;
        }

        .filter-dropdown {
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            color: #e2e8f0;
            cursor: pointer;
            min-width: 150px;
        }

        .bot-grid {
            display: grid;
            gap: 1.5rem;
        }

        .bot-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 1rem;
            padding: 1.5rem;
            transition: all 0.3s;
        }

        .bot-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .bot-info h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .bot-platform {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
        }

        .bot-contact {
            color: #64748b;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .bot-stats {
            display: flex;
            gap: 1.5rem;
            margin: 1rem 0;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            display: block;
        }

        .stat-value.success { color: #10b981; }
        .stat-value.warning { color: #f59e0b; }
        .stat-value.error { color: #ef4444; }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .bot-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .tag {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.875rem;
        }

        .bot-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-qr {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
        }

        .btn-edit {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .btn-delete {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 1rem;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 2rem;
            height: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: #e2e8f0;
            font-size: 1rem;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .form-select {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 0.75rem;
            border-radius: 0.5rem;
            color: #e2e8f0;
            cursor: pointer;
        }

        /* Tag Input with Bubbles */
        .tag-input-container {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 0.5rem;
            padding: 0.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            min-height: 42px;
        }

        .tag-bubble {
            background: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tag-remove {
            background: none;
            border: none;
            color: #60a5fa;
            cursor: pointer;
            padding: 0;
            font-size: 1rem;
            line-height: 1;
        }

        .tag-input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e2e8f0;
            padding: 0.25rem;
            min-width: 120px;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Users Section */
        .user-list {
            display: grid;
            gap: 1rem;
        }

        .user-item {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 0.75rem;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-details {
            flex: 1;
        }

        .user-email {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .user-role {
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .role-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .role-admin { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .role-read-only { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .role-write-only { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }

        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }

            .container {
                padding: 1rem;
            }

            .bot-stats {
                flex-direction: column;
                gap: 0.5rem;
            }

            .bot-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div style="display: flex; flex-direction: column; gap: 0.25rem;">
                <div class="logo">
                    <span>🌈 Nyan Bridge</span>
                </div>
                <div style="text-align: left;">
                    <span class="tagline">apps to apps hopping, nyan~</span>
                </div>
            </div>
        </div>
        <div class="header-right">
            <div id="userInfo"></div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('bots')">🌉 Bridges</button>
            <button class="tab" onclick="switchTab('users')">👥 Users</button>
            <button class="tab" onclick="switchTab('sessions')">🔐 Sessions</button>
        </div>

        <!-- Bridges Tab -->
        <div id="botsTab" class="tab-content active">
            <div class="section-header">
                <h1 class="section-title">Bridge Library</h1>
                <button class="create-bot-btn" onclick="openCreateBotModal()">+ Create Bridge</button>
            </div>

            <div class="search-filter">
                <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search bridges by name, platform, contact, or tag..." oninput="filterBots()">
                <select class="filter-dropdown" id="platformFilter" onchange="filterBots()">
                    <option value="">All Platforms</option>
                </select>
            </div>

            <div id="botList" class="bot-grid"></div>
        </div>

        <!-- Users Tab -->
        <div id="usersTab" class="tab-content">
            <div class="section-header">
                <h1 class="section-title">User Management</h1>
                <button class="create-bot-btn" onclick="openCreateUserModal()">+ Create User</button>
            </div>
            <div id="userList" class="user-list"></div>
        </div>

        <!-- Sessions Tab -->
        <div id="sessionsTab" class="tab-content">
            <div class="section-header">
                <h1 class="section-title">Active Sessions</h1>
                <button class="create-bot-btn" style="background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);" onclick="revokeAllSessions()">🚫 Revoke All Sessions</button>
            </div>
            
            <div class="search-filter">
                <input type="text" class="search-box" id="sessionLocationFilter" placeholder="🌍 Filter by location..." oninput="loadSessions()">
                <select class="filter-dropdown" id="sessionDeviceFilter" onchange="loadSessions()">
                    <option value="">All Devices</option>
                    <option value="Desktop">Desktop</option>
                    <option value="Mobile">Mobile</option>
                    <option value="Tablet">Tablet</option>
                </select>
                <select class="filter-dropdown" id="sessionBrowserFilter" onchange="loadSessions()">
                    <option value="">All Browsers</option>
                    <option value="Chrome">Chrome</option>
                    <option value="Safari">Safari</option>
                    <option value="Firefox">Firefox</option>
                    <option value="Edge">Edge</option>
                </select>
                <select class="filter-dropdown" id="sessionSortBy" onchange="loadSessions()">
                    <option value="login_time">Sort by: Login Time</option>
                    <option value="last_activity">Sort by: Last Activity</option>
                    <option value="ip_address">Sort by: IP Address</option>
                    <option value="location">Sort by: Location</option>
                </select>
                <select class="filter-dropdown" id="sessionSortOrder" onchange="loadSessions()">
                    <option value="desc">Newest First</option>
                    <option value="asc">Oldest First</option>
                </select>
            </div>
            
            <div id="sessionsList" class="user-list"></div>
        </div>
    </div>

    <!-- Create/Edit Bridge Modal -->
    <div id="botModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">Create New Bridge</h2>
                <button class="close-btn" onclick="closeBotModal()">×</button>
            </div>
            <form id="botForm" onsubmit="saveBotClicked(event)">
                <div class="form-group">
                    <label class="form-label">Platform</label>
                    <select class="form-select" id="botPlatform" required>
                        <option value="WhatsApp">WhatsApp</option>
                        <option value="Telegram">Telegram</option>
                        <option value="Discord">Discord</option>
                        <option value="Slack">Slack</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Destination Platform</label>
                    <select class="form-select" id="botDestinationPlatform" required>
                        <option value="Discord">Discord</option>
                        <option value="Slack">Slack</option>
                        <option value="Telegram">Telegram</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Contact (Phone/Username)</label>
                    <input type="text" class="form-input" id="botContact" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Tags</label>
                    <div class="tag-input-container" id="tagContainer">
                        <input type="text" class="tag-input" id="botTagsInput" placeholder="Type and press Enter..." onkeypress="addTagOnEnter(event)">
                    </div>
                </div>
                <button type="submit" class="submit-btn">Save Bot</button>
            </form>
        </div>
    </div>

    <!-- Create User Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Create New User</h2>
                <button class="close-btn" onclick="closeUserModal()">×</button>
            </div>
            <form id="userForm" onsubmit="saveUser(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="userEmail" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="userPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Role</label>
                    <select class="form-select" id="userRole" required>
                        <option value="admin">Admin</option>
                        <option value="read-only">Read Only</option>
                        <option value="write-only">Write Only</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Create User</button>
            </form>
        </div>
    </div>

    <!-- Change Email Modal -->
    <div id="changeEmailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Change Email Address</h2>
                <button class="close-btn" onclick="closeChangeEmailModal()">×</button>
            </div>
            <form id="changeEmailForm" onsubmit="saveNewEmail(event)">
                <input type="hidden" id="changeEmailUserId">
                <div class="form-group">
                    <label class="form-label">Current Email</label>
                    <input type="email" class="form-input" id="currentEmailDisplay" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label">New Email</label>
                    <input type="email" class="form-input" id="newEmail" required>
                </div>
                <button type="submit" class="submit-btn">Update Email</button>
            </form>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="changePasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Change Password</h2>
                <button class="close-btn" onclick="closeChangePasswordModal()">×</button>
            </div>
            <form id="changePasswordForm" onsubmit="saveNewPassword(event)">
                <input type="hidden" id="changePasswordUserId">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-input" id="newPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" class="form-input" id="confirmPassword" required minlength="6">
                </div>
                <button type="submit" class="submit-btn">Update Password</button>
            </form>
        </div>
    </div>

    <script>
        let bots = [];
        let filteredBots = [];
        let editingBotId = null;
        let expandedBots = new Set();
        let messageCache = {}; // Cache messages to avoid re-fetching on expand/collapse
        let allMessages = {}; // Store all messages by ID for media viewing
        let currentUser = null;
        let botTags = []; // Store tags as array
        let users = [];
        let sessions = [];

        // Check authentication on page load
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/status');
                const data = await res.json();
                
                if (!data.authenticated) {
                    window.location.href = '/login.html';
                    return false;
                }
                
                currentUser = data.user;
                const userInfo = document.getElementById('userInfo');
                const roleColors = {
                    'admin': '#10b981',
                    'read-only': '#f59e0b',
                    'write-only': '#3b82f6'
                };
                userInfo.innerHTML = `<span style="color: ${roleColors[currentUser.role] || '#94a3b8'};">● ${currentUser.email || currentUser.phone} (${currentUser.role})</span>`;
                
                return true;
            } catch (error) {
                window.location.href = '/login.html';
                return false;
            }
        }
        
        // Logout function
        async function logout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
                window.location.href = '/login.html';
            } catch (error) {
                console.error('Logout error:', error);
            }
        }
        
        // Tag Management Functions for Bubble UI
        function addTagOnEnter(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                const input = document.getElementById('botTagsInput');
                const tag = input.value.trim();
                
                if (tag && !botTags.includes(tag)) {
                    botTags.push(tag);
                    renderTags();
                    input.value = '';
                }
            }
        }

        function removeTag(tag) {
            botTags = botTags.filter(t => t !== tag);
            renderTags();
        }

        function renderTags() {
            const container = document.getElementById('tagContainer');
            const input = document.getElementById('botTagsInput');
            
            // Clear container except input
            container.innerHTML = '';
            
            // Add tag bubbles
            botTags.forEach(tag => {
                const bubble = document.createElement('div');
                bubble.className = 'tag-bubble';
                bubble.innerHTML = `
                    ${tag}
                    <button type="button" class="tag-remove" onclick="removeTag('${tag}')">×</button>
                `;
                container.appendChild(bubble);
            });
            
            // Re-add input
            container.appendChild(input);
        }

        // Bot CRUD Functions
        async function loadBots() {
            try {
                const response = await fetch('/api/bots');
                bots = await response.json();
                filteredBots = bots;
                renderBots();
                updatePlatformFilter();
            } catch (error) {
                console.error('Error loading bots:', error);
            }
        }

        function renderBots() {
            const botList = document.getElementById('botList');
            
            if (filteredBots.length === 0) {
                botList.innerHTML = '<p style="text-align: center; color: #94a3b8; padding: 2rem;">No bots found. Create your first bot to get started!</p>';
                return;
            }
            
            botList.innerHTML = filteredBots.map(bot => `
                <div class="bot-card">
                    <div class="bot-header">
                        <div class="bot-info">
                            <h3>${bot.input_platform} → ${bot.output_platform} Bridge</h3>
                            <div class="bot-platform">${bot.input_platform} → ${bot.output_platform}</div>
                            <div class="bot-contact">📞 ${bot.contact_info || 'No contact'}</div>
                        </div>
                        <div class="bot-stats">
                            <div class="stat">
                                <span class="stat-value">${bot.message_count || 0}</span>
                                <span class="stat-label">TOTAL</span>
                            </div>
                            <div class="stat">
                                <span class="stat-value success">${bot.forwarded_count || 0}</span>
                                <span class="stat-label">FORWARDED</span>
                            </div>
                            <div class="stat">
                                <span class="stat-value error">${bot.failed_count || 0}</span>
                                <span class="stat-label">FAILED</span>
                            </div>
                        </div>
                    </div>
                    ${bot.tags && bot.tags.length > 0 ? `
                        <div class="bot-tags">
                            ${bot.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    ` : ''}
                    <div class="bot-actions">
                        ${bot.input_platform === 'WhatsApp' ? `<button class="btn btn-qr" onclick="showQR('${bot.id}')">📱 QR Login</button>` : ''}
                        <button class="btn btn-edit" onclick="editBot('${bot.id}')">Edit</button>
                        <button class="btn btn-delete" onclick="deleteBot('${bot.id}')">Delete</button>
                        <button class="btn" onclick="toggleMessages('${bot.id}')">▼</button>
                    </div>
                </div>
            `).join('');
        }

        function filterBots() {
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            const platformFilter = document.getElementById('platformFilter').value;
            
            filteredBots = bots.filter(bot => {
                const matchesSearch = 
                    bot.input_platform.toLowerCase().includes(searchTerm) ||
                    bot.output_platform.toLowerCase().includes(searchTerm) ||
                    (bot.contact_info && bot.contact_info.toLowerCase().includes(searchTerm)) ||
                    (bot.tags && bot.tags.some(tag => tag.toLowerCase().includes(searchTerm)));
                
                const matchesPlatform = !platformFilter || bot.input_platform === platformFilter;
                
                return matchesSearch && matchesPlatform;
            });
            
            renderBots();
        }

        function updatePlatformFilter() {
            const platforms = [...new Set(bots.map(bot => bot.input_platform))];
            const filter = document.getElementById('platformFilter');
            filter.innerHTML = '<option value="">All Platforms</option>' + 
                platforms.map(p => `<option value="${p}">${p}</option>`).join('');
        }

        function openCreateBotModal() {
            editingBotId = null;
            document.getElementById('modalTitle').textContent = 'Create New Bridge';
            document.getElementById('botForm').reset();
            botTags = [];
            renderTags();
            document.getElementById('botModal').classList.add('active');
        }

        function editBot(id) {
            const bot = bots.find(b => b.id === id);
            if (!bot) return;
            
            editingBotId = id;
            document.getElementById('modalTitle').textContent = 'Edit Bridge';
            document.getElementById('botPlatform').value = bot.input_platform;
            document.getElementById('botDestinationPlatform').value = bot.output_platform;
            document.getElementById('botContact').value = bot.contact_info || '';
            botTags = bot.tags || [];
            renderTags();
            document.getElementById('botModal').classList.add('active');
        }

        function closeBotModal() {
            document.getElementById('botModal').classList.remove('active');
            editingBotId = null;
            botTags = [];
        }

        async function saveBotClicked(event) {
            event.preventDefault();
            
            const botData = {
                platform: document.getElementById('botPlatform').value,
                destination_platform: document.getElementById('botDestinationPlatform').value,
                contact: document.getElementById('botContact').value,
                tags: botTags
            };

            try {
                const url = editingBotId ? `/api/bots/${editingBotId}` : '/api/bots';
                const method = editingBotId ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(botData)
                });

                if (response.ok) {
                    closeBotModal();
                    loadBots();
                } else {
                    alert('Failed to save bot');
                }
            } catch (error) {
                console.error('Error saving bot:', error);
                alert('Error saving bot');
            }
        }

        async function deleteBot(id) {
            if (!confirm('Are you sure you want to delete this bot?')) return;
            
            try {
                const response = await fetch(`/api/bots/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    loadBots();
                }
            } catch (error) {
                console.error('Error deleting bot:', error);
            }
        }

        async function showQR(botId) {
            try {
                const response = await fetch(`/api/bots/${botId}/qr`);
                const data = await response.json();
                
                if (data.qr) {
                    const qrWindow = window.open('', 'QR Code', 'width=400,height=500');
                    qrWindow.document.write(`
                        <html>
                            <head><title>WhatsApp QR Code</title></head>
                            <body style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; font-family: sans-serif;">
                                <h2>Scan with WhatsApp</h2>
                                <img src="${data.qr}" style="width: 300px; height: 300px;" />
                                <p>Open WhatsApp → Settings → Linked Devices → Link a Device</p>
                            </body>
                        </html>
                    `);
                }
            } catch (error) {
                console.error('Error fetching QR code:', error);
                alert('Error generating QR code');
            }
        }

        function toggleMessages(botId) {
            // Placeholder for message expand/collapse
            console.log('Toggle messages for bot:', botId);
        }

        // User Management
        async function loadUsers() {
            try {
                const response = await fetch('/api/users');
                users = await response.json();
                renderUsers();
            } catch (error) {
                console.error('Error loading users:', error);
            }
        }

        function renderUsers() {
            const userList = document.getElementById('userList');
            userList.innerHTML = users.map(user => `
                <div class="user-item">
                    <div class="user-details">
                        <div class="user-email">${user.email || user.phone}</div>
                        <span class="role-badge role-${user.role}">${user.role}</span>
                    </div>
                    <div class="user-actions" style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;">
                        <select class="form-select" onchange="changeUserRole('${user.id}', this.value)" style="width: auto; padding: 0.5rem;">
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                            <option value="read-only" ${user.role === 'read-only' ? 'selected' : ''}>Read Only</option>
                            <option value="write-only" ${user.role === 'write-only' ? 'selected' : ''}>Write Only</option>
                        </select>
                        ${user.email ? `<button class="btn" style="flex: none; padding: 0.5rem 1rem; background: #3b82f6;" onclick="changeUserEmail('${user.id}', '${user.email}')">✉️ Change Email</button>` : ''}
                        ${user.email ? `<button class="btn" style="flex: none; padding: 0.5rem 1rem; background: #8b5cf6;" onclick="changeUserPassword('${user.id}')">🔒 Change Password</button>` : ''}
                        ${user.email !== currentUser.email && user.phone !== currentUser.phone ? 
                            `<button class="btn btn-delete" style="flex: none; padding: 0.5rem 1rem;" onclick="deleteUser('${user.id}')">Delete</button>` : 
                            '<span style="color: #94a3b8; font-size: 0.875rem;">(You)</span>'}
                    </div>
                </div>
            `).join('');
        }

        function openCreateUserModal() {
            document.getElementById('userModal').classList.add('active');
        }

        function closeUserModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        async function saveUser(event) {
            event.preventDefault();
            
            const userData = {
                email: document.getElementById('userEmail').value,
                password: document.getElementById('userPassword').value,
                role: document.getElementById('userRole').value
            };

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (response.ok) {
                    closeUserModal();
                    loadUsers();
                    document.getElementById('userForm').reset();
                } else {
                    const error = await response.json();
                    alert(error.error || 'Failed to create user');
                }
            } catch (error) {
                console.error('Error creating user:', error);
                alert('Error creating user');
            }
        }

        async function changeUserRole(userId, newRole) {
            try {
                const response = await fetch(`/api/users/${userId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role: newRole })
                });

                if (response.ok) {
                    loadUsers();
                } else {
                    alert('Failed to update user role');
                }
            } catch (error) {
                console.error('Error updating user role:', error);
            }
        }

        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to delete this user?')) return;
            
            try {
                const response = await fetch(`/api/users/${userId}`, { method: 'DELETE' });
                if (response.ok) {
                    loadUsers();
                } else {
                    alert('Failed to delete user');
                }
            } catch (error) {
                console.error('Error deleting user:', error);
            }
        }

        function changeUserEmail(userId, currentEmail) {
            document.getElementById('changeEmailUserId').value = userId;
            document.getElementById('currentEmailDisplay').value = currentEmail;
            document.getElementById('newEmail').value = '';
            document.getElementById('changeEmailModal').classList.add('active');
        }

        function closeChangeEmailModal() {
            document.getElementById('changeEmailModal').classList.remove('active');
        }

        async function saveNewEmail(event) {
            event.preventDefault();
            
            const userId = document.getElementById('changeEmailUserId').value;
            const newEmail = document.getElementById('newEmail').value.trim();

            // Client-side validation
            if (!newEmail) {
                alert('Email is required');
                return;
            }
            
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(newEmail)) {
                alert('Please enter a valid email address');
                return;
            }

            try {
                const response = await fetch(`/api/users/${userId}/email`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: newEmail })
                });

                if (response.ok) {
                    closeChangeEmailModal();
                    loadUsers();
                    alert('Email updated successfully!');
                } else {
                    const error = await response.json();
                    alert(error.error || 'Failed to update email');
                }
            } catch (error) {
                console.error('Error updating email:', error);
                alert('Error updating email');
            }
        }

        function changeUserPassword(userId) {
            document.getElementById('changePasswordUserId').value = userId;
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            document.getElementById('changePasswordModal').classList.add('active');
        }

        function closeChangePasswordModal() {
            document.getElementById('changePasswordModal').classList.remove('active');
        }

        async function saveNewPassword(event) {
            event.preventDefault();
            
            const userId = document.getElementById('changePasswordUserId').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Client-side validation
            if (!newPassword || !newPassword.trim()) {
                alert('Password is required');
                return;
            }
            
            if (newPassword.length < 6) {
                alert('Password must be at least 6 characters long');
                return;
            }

            if (newPassword !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            try {
                const response = await fetch(`/api/users/${userId}/password`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: newPassword })
                });

                if (response.ok) {
                    closeChangePasswordModal();
                    alert('Password updated successfully!');
                } else {
                    const error = await response.json();
                    alert(error.error || 'Failed to update password');
                }
            } catch (error) {
                console.error('Error updating password:', error);
                alert('Error updating password');
            }
        }

        // Session Management
        async function loadSessions() {
            try {
                const locationFilter = document.getElementById('sessionLocationFilter')?.value || '';
                const deviceFilter = document.getElementById('sessionDeviceFilter')?.value || '';
                const browserFilter = document.getElementById('sessionBrowserFilter')?.value || '';
                const sortBy = document.getElementById('sessionSortBy')?.value || 'login_time';
                const sortOrder = document.getElementById('sessionSortOrder')?.value || 'desc';
                
                const params = new URLSearchParams();
                if (locationFilter) params.append('filterLocation', locationFilter);
                if (deviceFilter) params.append('filterDevice', deviceFilter);
                if (browserFilter) params.append('filterBrowser', browserFilter);
                params.append('sortBy', sortBy);
                params.append('sortOrder', sortOrder);
                
                const response = await fetch(`/api/sessions?${params}`);
                if (!response.ok) return;
                
                const data = await response.json();
                const sessionsList = document.getElementById('sessionsList');
                
                if (data.sessions.length === 0) {
                    sessionsList.innerHTML = '<p style="text-align: center; color: #94a3b8; padding: 2rem;">No active sessions found</p>';
                    return;
                }
                
                sessionsList.innerHTML = data.sessions.map(session => {
                    const loginDate = new Date(session.login_time).toLocaleString();
                    const lastActivity = new Date(session.last_activity).toLocaleString();
                    const statusBadge = session.is_active 
                        ? '<span style="color: #10b981; font-weight: 600;">● Active</span>' 
                        : '<span style="color: #94a3b8;">○ Inactive</span>';
                    
                    return `
                        <div class="user-card" style="opacity: ${session.is_active ? '1' : '0.6'}">
                            <div class="user-info">
                                <div class="user-email">${session.email || session.phone || 'Unknown User'}</div>
                                <div class="user-role">${statusBadge}</div>
                            </div>
                            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 0.75rem; margin-top: 0.75rem; font-size: 0.875rem; color: #cbd5e1;">
                                <div><strong>Device:</strong> ${session.device_type || 'Unknown'}</div>
                                <div><strong>Browser:</strong> ${session.browser || 'Unknown'}</div>
                                <div><strong>OS:</strong> ${session.os || 'Unknown'}</div>
                                <div><strong>IP:</strong> ${session.ip_address || 'Unknown'}</div>
                                <div><strong>Location:</strong> 🌍 ${session.location || 'Unknown Location'}</div>
                                <div><strong>Login:</strong> ${loginDate}</div>
                                <div><strong>Last Activity:</strong> ${lastActivity}</div>
                            </div>
                            <div class="user-actions">
                                ${session.is_active ? `<button class="btn btn-delete" onclick="revokeSession(${session.id})">Revoke</button>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading sessions:', error);
            }
        }

        async function revokeSession(sessionId) {
            if (!confirm('Are you sure you want to revoke this session? The user will be logged out immediately.')) return;
            
            try {
                const response = await fetch(`/api/sessions/${sessionId}`, { method: 'DELETE' });
                if (response.ok) {
                    loadSessions();
                    alert('Session revoked successfully');
                } else {
                    alert('Failed to revoke session');
                }
            } catch (error) {
                console.error('Error revoking session:', error);
                alert('Error revoking session');
            }
        }

        async function revokeAllSessions() {
            if (!confirm('⚠️ WARNING: This will revoke ALL active sessions except your current one. All other users will be logged out immediately. Are you sure?')) return;
            
            try {
                const response = await fetch('/api/sessions/revoke-all', { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });
                
                if (response.ok) {
                    const data = await response.json();
                    loadSessions();
                    alert(`Successfully revoked ${data.count} session(s)`);
                } else {
                    alert('Failed to revoke all sessions');
                }
            } catch (error) {
                console.error('Error revoking all sessions:', error);
                alert('Error revoking all sessions');
            }
        }

        // Tab Switching
        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(`${tabName}Tab`).classList.add('active');
            
            // Load data for the tab
            if (tabName === 'users') {
                loadUsers();
            } else if (tabName === 'sessions') {
                loadSessions();
            }
        }

        // Initialize
        checkAuth().then(authenticated => {
            if (authenticated) {
                loadBots();
            }
        });
    </script>
</body>
</html>
