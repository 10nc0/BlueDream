<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Your Nyanbook~</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <h1>Your Nyanbook~</h1>
            <p>X to Discord Note</p>
        </div>

        <div id="genesisNotice" class="genesis-notice hidden">
            <div class="emoji">🌟</div>
            <div class="title">Genesis Admin</div>
            <div class="description">You'll be the first user with your own isolated database!</div>
        </div>

        <div id="errorMessage" class="error hidden"></div>
        <div id="successMessage" class="success hidden"></div>

        <form id="signupForm">
            <div class="form-group">
                <label>Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="you@example.com" 
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label>Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Min. 6 characters" 
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    placeholder="Confirm your password" 
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
                <small class="helper-text">⚠️ Use a unique password. We hash it, but don't reuse from Gmail/Twitter.</small>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <div class="link">
            Already have an account? <a href="/login.html">Log in</a>
        </div>
    </div>

    <script src="/js/auth-signup.js"></script>
</body>
</html>
