<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Your Nyanbook~</title>
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/components/cat-animation.css">
</head>
<body>
    <div class="signup-container">
        <!-- UNIVERSE FRAME TRANSCENDENTAL CAT COMPONENT -->
        <div id="catContainer" class="cat-animation-component">
            <canvas id="hopCanvas" class="character-canvas" width="125" height="125"></canvas>
            <div id="dateTimeDefault" class="cat-datetime-default">
                <span id="currentTime">2025/11/01 - 8:00:00AM</span>
            </div>
        </div>
        
        <div class="logo">
            <h1>Your Nyanbook~</h1>
            <p>Every Record, Forever, Searchable <br> also (#Hash)Tag-enabled. Nyan~</p>
        </div>

        <div id="genesisNotice" class="genesis-notice hidden">
            <div class="emoji">🌟</div>
            <div class="title">Genesis Admin</div>
            <div class="description">You'll be the first user with your own isolated database!</div>
        </div>

        <div id="errorMessage" class="error hidden"></div>
        <div id="successMessage" class="success hidden"></div>

        <form id="signupForm">
            <div class="form-group">
                <label>Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    placeholder="you@example.com" 
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label>Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Min. 6 characters" 
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    placeholder="Confirm your password" 
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
                <small class="helper-text">⚠️ Use a unique password. We hash it, but don't reuse from Gmail/Twitter.</small>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <div class="link">
            Already have an account? <a href="/login.html">Log in</a>
        </div>
    </div>

    <script src="/js/ui/cat-animation.js"></script>
    <script src="/js/auth-signup.js"></script>
</body>
</html>
