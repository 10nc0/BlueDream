<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Your Nyanbook~</title>
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="title-section">
                <h1>Create Account</h1>
                <div class="description">You'll be the first user with your own isolated database!</div>
            </div>

            <div id="errorMessage" class="error hidden"></div>
            <div id="successMessage" class="success hidden"></div>

            <div class="info-box">
                <strong>🔐 Security Note:</strong> Your Nyanbook is private.<br>
                Save or note your password. Never share.
            </div>

            <form id="signupForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a strong password" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1234567890" required autocomplete="tel">
                </div>
                <div class="form-group">
                    <label>Country</label>
                    <input type="text" id="country" placeholder="Indonesia" required>
                </div>
                <div class="form-group">
                    <label>Timezone</label>
                    <input type="text" id="timezone" placeholder="Asia/Jakarta" required>
                </div>
                <button type="submit">Create Account</button>
            </form>
        </div>
    </div>

    <script src="/js/auth-signup.js"></script>
</body>
</html>
