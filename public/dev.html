<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyanbook~ Dev Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #0a0a0f 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #00ff88, #00ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h2 {
            color: #fff;
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .card p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.875rem;
        }

        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 0.875rem;
            font-family: 'Monaco', 'Courier New', monospace;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #00ff88;
            background: rgba(0, 0, 0, 0.4);
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00ccff);
            color: #000;
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 255, 136, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 1rem;
            padding: 0.875rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        .status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: block;
        }

        .status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            display: block;
        }

        .info-box {
            background: rgba(88, 101, 242, 0.1);
            border: 1px solid rgba(88, 101, 242, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .info-box h3 {
            color: #5865f2;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .info-box ul {
            list-style: none;
            padding-left: 0;
        }

        .info-box li {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .info-box li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #5865f2;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: #94a3b8;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #00ff88;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .back-link:hover {
            color: #00ccff;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">🔐 Verifying admin access...</div>
    </div>

    <script>
        // Check authentication
        const accessToken = localStorage.getItem('accessToken');
        if (!accessToken) {
            window.location.href = '/';
        }

        async function init() {
            const app = document.getElementById('app');
            
            // Verify admin access
            try {
                const userRes = await fetch('/api/user', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                if (!userRes.ok) {
                    throw new Error('Not authenticated');
                }
                
                const userData = await userRes.json();
                
                // Allow both 'dev' and 'admin' roles
                if (userData.role !== 'admin' && userData.role !== 'dev') {
                    app.innerHTML = `
                        <div class="card" style="text-align: center;">
                            <h2>🚫 Access Denied</h2>
                            <p>This page is only accessible to administrators.</p>
                            <a href="/" class="back-link">← Back to Dashboard</a>
                        </div>
                    `;
                    return;
                }
                
                // Load admin panel
                renderAdminPanel(userData);
                
            } catch (error) {
                window.location.href = '/';
            }
        }

        let currentUser = null;
        let allBridges = [];
        let viewMode = 'dbA'; // 'dbA' (Nyanbook Ledger) or 'notdbA' (User's webhook)

        async function renderAdminPanel(user) {
            currentUser = user;
            const app = document.getElementById('app');
            
            // Dev #01 has god view, Admin #0n sees only their bridges
            const isDev = user.role === 'dev';
            
            app.innerHTML = `
                <a href="/" class="back-link">← Back to Dashboard</a>
                
                <div class="header">
                    <h1>🛠️ Nyanbook~ Dev Panel</h1>
                    <p style="margin-bottom: 1rem;">${isDev ? '👑 Dev #01' : '🔑 Admin'}: ${user.email}</p>
                    
                    ${isDev ? `
                        <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 1.5rem;">
                            <button onclick="switchView('dbA')" style="width: auto; background: ${viewMode === 'dbA' ? 'linear-gradient(135deg, #00ff88, #00ccff)' : 'rgba(255,255,255,0.1)'}; color: ${viewMode === 'dbA' ? '#000' : '#94a3b8'};">
                                📜 dbA (Nyanbook Ledger)
                            </button>
                            <button onclick="switchView('notdbA')" style="width: auto; background: ${viewMode === 'notdbA' ? 'linear-gradient(135deg, #00ff88, #00ccff)' : 'rgba(255,255,255,0.1)'}; color: ${viewMode === 'notdbA' ? '#000' : '#94a3b8'};">
                                📝 notdbA (User Webhooks)
                            </button>
                        </div>
                    ` : ''}
                </div>

                <div id="bridgesList" class="card">
                    <h2>🌉 Bridges</h2>
                    <div style="text-align: center; padding: 2rem; color: #94a3b8;">
                        Loading bridges...
                    </div>
                </div>
            `;
            
            await loadBridges();
        }
        
        async function switchView(mode) {
            viewMode = mode;
            await renderAdminPanel(currentUser);
        }
        
        async function loadBridges() {
            try {
                const response = await fetch('/api/bridges', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                if (!response.ok) throw new Error('Failed to load bridges');
                
                allBridges = await response.json();
                renderBridges();
            } catch (error) {
                console.error('Error loading bridges:', error);
                document.getElementById('bridgesList').innerHTML = `
                    <h2>🌉 Bridges</h2>
                    <p style="text-align: center; color: #ef4444; padding: 2rem;">
                        Failed to load bridges
                    </p>
                `;
            }
        }
        
        function renderBridges() {
            const container = document.getElementById('bridgesList');
            
            if (allBridges.length === 0) {
                container.innerHTML = `
                    <h2>🌉 Bridges</h2>
                    <p style="text-align: center; color: #94a3b8; padding: 2rem;">
                        No bridges created yet. Create your first bridge in the <a href="/" style="color: #00ff88;">main dashboard</a>!
                    </p>
                `;
                return;
            }
            
            const isDev = currentUser.role === 'dev';
            const viewLabel = isDev && viewMode === 'dbA' ? 'dbA (Nyanbook Ledger)' : 'notdbA (User Webhook)';
            
            container.innerHTML = `
                <h2>🌉 Bridges ${isDev ? `<span style="color: #00ff88; font-size: 0.875rem;">(${viewLabel})</span>` : ''}</h2>
                <div style="display: grid; gap: 1rem; margin-top: 1.5rem;">
                    ${allBridges.map(bridge => `
                        <div style="background: rgba(0,0,0,0.3); border-radius: 12px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.1);">
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                                <div>
                                    <h3 style="color: #fff; font-size: 1.125rem; margin-bottom: 0.5rem;">
                                        ${bridge.input_platform} → ${bridge.output_platform}
                                    </h3>
                                    <p style="color: #94a3b8; font-size: 0.875rem; font-family: monospace;">
                                        ID: ${bridge.fractal_id?.substring(0, 12)}...
                                    </p>
                                </div>
                                <div style="text-align: right;">
                                    <div style="background: rgba(16, 185, 129, 0.2); color: #10b981; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.875rem; font-weight: 600;">
                                        ${bridge.message_count || 0} msgs
                                    </div>
                                </div>
                            </div>
                            
                            <div style="background: rgba(88, 101, 242, 0.1); border-radius: 8px; padding: 1rem; margin-top: 1rem;">
                                <p style="color: #94a3b8; font-size: 0.875rem; margin-bottom: 0.75rem;">
                                    💡 Thread: <code style="color: #00ff88;">${bridge.output_credentials?.thread_name || 'Not created yet'}</code>
                                </p>
                                <button 
                                    onclick="window.open('https://discord.com/channels/@me', '_blank')"
                                    style="background: #5865f2; color: white; width: 100%;"
                                >
                                    🚀 Open Discord ${isDev && viewMode === 'dbA' ? '(dbA Ledger)' : '(notdbA)'}
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Initialize
        init();
    </script>
</body>
</html>
