<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Nyan Bridge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.618rem;
        }

        .register-container {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(30px) saturate(200%) brightness(1.1);
            -webkit-backdrop-filter: blur(30px) saturate(200%) brightness(1.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.25rem;
            padding: 2rem;
            width: 100%;
            max-width: 535px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }
        
        @media (max-width: 480px) {
            body {
                padding: 0.618rem;
            }
            .register-container {
                padding: 1.618rem;
                border-radius: 0.618rem;
            }
            .logo h1 {
                font-size: 1.25rem;
            }
            .logo p {
                font-size: 0.875rem;
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 1.618rem;
        }

        .logo h1 {
            color: #f1f5f9;
            font-size: 1.618rem;
            font-weight: 700;
            margin-bottom: 0.618rem;
        }

        .logo p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.618rem;
        }

        label {
            display: block;
            color: #e2e8f0;
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.618rem;
        }

        input, select {
            width: 100%;
            padding: 0.618rem 1rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.618rem;
            color: #f1f5f9;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: rgba(34, 197, 94, 0.5);
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
        }

        input::placeholder {
            color: #64748b;
        }

        select {
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 0.618rem 1.618rem;
            background: rgba(34, 197, 94, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 0.618rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.2);
        }

        button:hover {
            background: rgba(22, 163, 74, 0.95);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        button:disabled {
            background: rgba(71, 85, 105, 0.8);
            cursor: not-allowed;
            transform: none;
        }

        .btn-back {
            background: rgba(71, 85, 105, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 0.618rem;
        }
        
        .btn-back:hover {
            background: rgba(100, 116, 139, 0.9);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 0.618rem;
            border-radius: 0.618rem;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 0.618rem;
            border-radius: 0.618rem;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .help-text {
            color: #64748b;
            font-size: 0.875rem;
            margin-top: 0.618rem;
        }

        .tabs {
            display: flex;
            gap: 0.618rem;
            margin-bottom: 1.618rem;
        }

        .tab {
            flex: 1;
            padding: 0.618rem 1rem;
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.618rem;
            color: #94a3b8;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .tab:hover {
            background: rgba(51, 65, 85, 0.5);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .tab.active {
            background: rgba(34, 197, 94, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-color: rgba(34, 197, 94, 0.5);
            color: #fff;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .link {
            text-align: center;
            margin-top: 1.618rem;
            color: #94a3b8;
            font-size: 1rem;
        }

        .link a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
        }

        .link a:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>🌉 Nyan Bridge</h1>
            <p>Create New Account</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('email')">Email Register</div>
            <div class="tab" onclick="switchTab('phone')">Phone Register</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
        <div id="success" class="success" style="display: none;"></div>

        <!-- Email Registration -->
        <div id="email-form" class="form-section active">
            <form onsubmit="registerWithEmail(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a strong password" required minlength="8">
                    <p class="help-text">Minimum 8 characters</p>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm-password" placeholder="Confirm your password" required minlength="8">
                </div>
                <button type="submit">Create Account</button>
            </form>
        </div>

        <!-- Phone Registration -->
        <div id="phone-form" class="form-section">
            <div id="phone-request">
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1234567890" required>
                    <p class="help-text">Enter with country code (e.g., +1234567890)</p>
                </div>
                <button onclick="requestOTP(event)">Send OTP</button>
            </div>

            <div id="phone-verify" style="display: none;">
                <div class="form-group">
                    <label>Enter OTP</label>
                    <input type="text" id="otp" placeholder="123456" maxlength="6" required>
                    <p class="help-text">Check console for OTP code (development only)</p>
                </div>
                <button onclick="verifyOTP(event)">Verify & Register</button>
                <button onclick="backToPhone()" class="btn-back">Back</button>
            </div>
        </div>

        <button onclick="window.location.href='/login.html'" class="btn-back">Back to Login</button>

        <div class="link">
            Already have an account? <a href="/login.html">Sign in</a>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'email') {
                document.querySelector('.tabs .tab:nth-child(1)').classList.add('active');
                document.getElementById('email-form').classList.add('active');
            } else {
                document.querySelector('.tabs .tab:nth-child(2)').classList.add('active');
                document.getElementById('phone-form').classList.add('active');
            }
            
            hideMessages();
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('success');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }

        async function registerWithEmail(e) {
            e.preventDefault();
            hideMessages();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }
            
            try {
                const res = await fetch('/api/auth/register/public', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess('Account created successfully! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showError(data.error || 'Registration failed');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        async function requestOTP(e) {
            e.preventDefault();
            hideMessages();
            
            const phone = document.getElementById('phone').value;
            
            try {
                const res = await fetch('/api/auth/otp/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess(`OTP sent to ${phone}! Check console for code (dev mode)`);
                    console.log('🔐 OTP CODE:', data.devOtp);
                    document.getElementById('phone-request').style.display = 'none';
                    document.getElementById('phone-verify').style.display = 'block';
                } else {
                    showError(data.error || 'Failed to send OTP');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        async function verifyOTP(e) {
            e.preventDefault();
            hideMessages();
            
            const phone = document.getElementById('phone').value;
            const otp = document.getElementById('otp').value;
            
            try {
                const res = await fetch('/api/auth/otp/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, otp })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showSuccess('Account created & logged in! Redirecting...');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showError(data.error || 'Invalid OTP');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
        }

        function backToPhone() {
            document.getElementById('phone-request').style.display = 'block';
            document.getElementById('phone-verify').style.display = 'none';
            document.getElementById('otp').value = '';
            hideMessages();
        }

        // Check if already logged in
        fetch('/api/auth/status')
            .then(res => res.json())
            .then(data => {
                if (data.authenticated) {
                    window.location.href = '/';
                }
            });
    </script>
</body>
</html>
